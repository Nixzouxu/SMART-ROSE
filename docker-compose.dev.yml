
services:
  postgres:
    image: postgres:16-alpine
    container_name: smartrose-postgres-dev
    environment:
      POSTGRES_USER: smartrose
      POSTGRES_PASSWORD: smartrose_dev_pass
      POSTGRES_DB: smartrose_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartrose -d smartrose_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartrose-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smartrose-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smartrose_admin
      MINIO_ROOT_PASSWORD: smartrose_minio_pass
    ports:
      - '9000:9000' # API (S3-compatible endpoint)
      - '9001:9001' # Web console
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: smartrose-mailhog-dev
    ports:
      - '1025:1025' # SMTP server (dipakai app untuk kirim email OTP/reset password)
      - '8025:8025' # Web UI untuk lihat email yang "terkirim"

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data: