version: '3.8'

services:
  app:
    image: ghcr.io/nixzouxu/smart-rose-backend:latest
    env_file: .env.production
    ports:
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "smartrose-app"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "smartrose-postgres"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    logging:
      driver: "journald"
      options:
        tag: "smartrose-redis"

volumes:
  postgres_data:
