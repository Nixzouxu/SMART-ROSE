name: CI - Lint & Test

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartrose
          POSTGRES_PASSWORD: smartrosedev123
          POSTGRES_DB: smartrose_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 4000
      APP_URL: http://localhost:4000
      DATABASE_URL: postgresql://smartrose:smartrosedev123@localhost:5433/smartrose_dev?schema=public
      DIRECT_URL: postgresql://smartrose:smartrosedev123@localhost:5433/smartrose_dev?schema=public
      REDIS_URL: redis://localhost:6379
      STORAGE_PROVIDER: local
      JWT_ACCESS_SECRET: ci_test_access_secret_not_for_production
      JWT_REFRESH_SECRET: ci_test_refresh_secret_not_for_production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ci_test_encryption_key_32bytes12
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@smartrose.local
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests
        run: npm test
