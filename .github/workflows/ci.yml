name: CI - Lint & Test

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartrose
          POSTGRES_PASSWORD: smartrosedev123
          POSTGRES_DB: smartrose_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

    env:
      NODE_ENV: test
      PORT: 4000
      APP_URL: http://localhost:4000
      DATABASE_URL: postgresql://smartrose:smartrosedev123@localhost:5433/smartrose_dev?schema=public
      DIRECT_URL: postgresql://smartrose:smartrosedev123@localhost:5433/smartrose_dev?schema=public
      REDIS_URL: redis://localhost:6379
      STORAGE_PROVIDER: local
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ci_test_minio_access_key
      MINIO_SECRET_KEY: ci_test_minio_secret_key
      MINIO_BUCKET: ci-test-bucket
      JWT_ACCESS_SECRET: ci_test_access_secret_not_for_production
      JWT_REFRESH_SECRET: ci_test_refresh_secret_not_for_production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@smartrose.local
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=ci_test_minio_access_key \
            -e MINIO_ROOT_PASSWORD=ci_test_minio_secret_key \
            minio/minio server /data
          echo "Menunggu MinIO siap..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO siap!"
              break
            fi
            echo "Percobaan $i belum siap, tunggu 3 detik..."
            sleep 3
          done

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run tests
        run: npm test
